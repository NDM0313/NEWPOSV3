# Auto-deploy to VPS on push to main or before-mobile-replace
#
# GitHub → repo → Settings → Secrets and variables → Actions (Repository secrets):
#   - VPS_SSH_KEY  = full private key (BEGIN … END), OR
#   - SSH_PRIVATE_KEY = same (fallback name if the first was mis-typed)
#
# If you put the key under Settings → Environments → <env>, add to the job below:
#   environment: <env>
#
# The key’s public line must be in root@VPS:~/.ssh/authorized_keys
#
name: Deploy to VPS

on:
  push:
    branches:
      - main
      - before-mobile-replace
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Write multiline key to a file (more reliable than passing raw key into the action only).
      - name: Prepare SSH key file
        id: sshkey
        run: |
          set -euo pipefail
          KEY="${VPS_KEY_MAIN:-}"
          if [ -z "$KEY" ]; then KEY="${VPS_KEY_ALT:-}"; fi
          if [ -z "$KEY" ]; then
            echo "::error::No deploy private key found. Add repository secret VPS_SSH_KEY or SSH_PRIVATE_KEY (full private key) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          KEYFILE="${RUNNER_TEMP}/vps_github_actions.pem"
          printf '%s\n' "$KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          echo "keyfile=$KEYFILE" >> "$GITHUB_OUTPUT"
        env:
          VPS_KEY_MAIN: ${{ secrets.VPS_SSH_KEY }}
          VPS_KEY_ALT: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 72.62.254.176
          username: root
          key_path: ${{ steps.sshkey.outputs.keyfile }}
          port: 22
          timeout: 60s
          command_timeout: 45m
          fingerprint: SHA256:Dg8lMBmQTeyUuwH58i/nvZIKRZgo6cbfJSBo00WTufQ
          use_insecure_cipher: true
          script: |
            set -e
            cd /root/NEWPOSV3
            BRANCH="${{ github.ref_name }}"
            echo "=== Auto-deploy $(date) ==="
            echo "  Branch: $BRANCH"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            export BRANCH
            bash deploy/deploy.sh
            echo "=== Deploy complete ==="

      - name: Remove SSH key file
        if: always()
        run: rm -f "${{ steps.sshkey.outputs.keyfile }}"

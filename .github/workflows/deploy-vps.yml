# Auto-deploy to VPS on push to main or before-mobile-replace
#
# GitHub → Settings → Secrets and variables → Actions:
#   VPS_SSH_KEY = full private key (-----BEGIN … through … END-----)
#   Optional: SSH_PRIVATE_KEY (same key if VPS_SSH_KEY name was wrong)
#
name: Deploy to VPS

on:
  push:
    branches:
      - main
      - before-mobile-replace
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Prepare SSH key file
        id: sshkey
        run: |
          set -euo pipefail
          KEY="${VPS_KEY_MAIN:-}"
          if [ -z "$KEY" ]; then KEY="${VPS_KEY_ALT:-}"; fi
          if [ -z "$KEY" ]; then
            echo "::error::No deploy private key. Add repository secret VPS_SSH_KEY (or SSH_PRIVATE_KEY)."
            exit 1
          fi
          KEYFILE="${RUNNER_TEMP}/vps_deploy.pem"
          printf '%s\n' "$KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          echo "keyfile=$KEYFILE" >> "$GITHUB_OUTPUT"
        env:
          VPS_KEY_MAIN: ${{ secrets.VPS_SSH_KEY }}
          VPS_KEY_ALT: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Validate key (no secret printed)
        run: |
          set -euo pipefail
          KEYFILE="${{ steps.sshkey.outputs.keyfile }}"
          ssh-keygen -y -f "$KEYFILE" > /dev/null
          echo "Private key parses OK."
          echo "Deploy key fingerprint (compare to root@VPS ~/.ssh/authorized_keys):"
          ssh-keygen -lf "$KEYFILE"

      - name: Deploy to VPS (OpenSSH)
        env:
          KEYFILE: ${{ steps.sshkey.outputs.keyfile }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/ssh"
          KNOWN="${RUNNER_TEMP}/ssh/known_hosts"
          ssh-keyscan -T 10 -p 22 72.62.254.176 >> "$KNOWN" 2>/dev/null || true
          echo "Deploy branch: ${DEPLOY_BRANCH}"
          ssh -i "$KEYFILE" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$KNOWN" \
            -o ConnectTimeout=30 \
            -p 22 \
            root@72.62.254.176 \
            "set -euo pipefail; export BRANCH='${DEPLOY_BRANCH}'; cd /root/NEWPOSV3; echo \"=== Auto-deploy \$(date -u) ===\"; echo \"  Branch: \$BRANCH\"; git fetch origin \"\$BRANCH\"; git reset --hard \"origin/\$BRANCH\"; bash deploy/deploy.sh; echo \"=== Deploy complete ===\""

      - name: Remove SSH key file
        if: always()
        run: rm -f "${{ steps.sshkey.outputs.keyfile }}"

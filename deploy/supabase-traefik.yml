# Supabase Kong API + Studio (CORS for auth refresh from localhost + ERP)
# Studio: allow storage in browsers that respect Permissions-Policy (may help with localStorage SecurityError)
http:
  middlewares:
    studio-storage-policy:
      headers:
        customResponseHeaders:
          Permissions-Policy: "storage-access=(self)"
    supabase-cors:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:5173"
          - "https://erp.dincouture.pk"
        accessControlAllowMethods:
          - GET
          - POST
          - OPTIONS
          - PUT
          - PATCH
          - DELETE
        accessControlAllowHeaders:
          - "*"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400
        addVaryHeader: true
  routers:
    supabase-dincouture:
      rule: Host(`supabase.dincouture.pk`)
      service: supabase-dincouture
      middlewares:
        - supabase-cors
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
    supabase-http-redirect:
      rule: Host(`supabase.dincouture.pk`)
      middlewares:
        - redirect-to-https
      service: supabase-dincouture
      entryPoints:
        - web
    studio-dincouture:
      rule: Host(`studio.dincouture.pk`)
      service: studio-dincouture
      middlewares:
        - studio-storage-policy
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
    supabase-via-ip:
      rule: Host(`72.62.254.176`) && (PathPrefix(`/rest`) || PathPrefix(`/auth`) || PathPrefix(`/realtime`) || PathPrefix(`/storage`) || PathPrefix(`/functions`))
      service: supabase-dincouture
      entryPoints:
        - websecure
      tls: {}
  services:
    supabase-dincouture:
      loadBalancer:
        servers:
          - url: http://supabase-kong:8000
        passHostHeader: true
    studio-dincouture:
      loadBalancer:
        servers:
          - url: http://supabase-studio:3000
        passHostHeader: true

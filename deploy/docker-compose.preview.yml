# Phase 2.9A-3 — Parallel preview ERP (browser waiver QA only)
# Does NOT replace erp-frontend / erp.dincouture.pk
#
# From project root on VPS:
#   cd /root/NEWPOSV3-preview-qa
#   bash deploy/write-erp-env-from-supabase-docker-env.sh
#   export VITE_BUILD_COMMIT=ae646222 CACHEBUST=$(date +%s)
#   docker compose -f deploy/docker-compose.preview.yml --env-file .env.production build erp-preview
#   docker compose -f deploy/docker-compose.preview.yml --env-file .env.production up -d --force-recreate erp-preview
#
# Ops access: ssh -N -L 3002:127.0.0.1:3002 dincouture-vps → http://localhost:3002
#
# Do NOT run deploy/deploy.sh (migrations / RLS). Frontend-only.

services:
  erp-preview:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_URL_MOBILE: ${VITE_SUPABASE_URL_MOBILE:-https://supabase.dincouture.pk}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_DISABLE_REALTIME: ${VITE_DISABLE_REALTIME:-true}
        VITE_BUILD_COMMIT: ${VITE_BUILD_COMMIT:-ae646222}
        CACHEBUST: ${CACHEBUST:-0}
    image: erp-frontend-preview:latest
    container_name: erp-frontend-preview
    restart: unless-stopped
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

networks:
  default:
    driver: bridge

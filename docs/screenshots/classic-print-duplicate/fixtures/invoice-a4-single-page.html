<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Classic A4 Invoice — Single Page Print Fixture</title>
  <link rel="stylesheet" href="../../../../src/styles/index.css" />
  <style>
    body { margin: 0; background: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    .classic-print-base { padding: 20px; max-width: 800px; margin: 0 auto; }
    .classic-print-header { margin-bottom: 16px; border-bottom: 1px solid #e5e7eb; padding-bottom: 12px; }
    .classic-print-company { font-size: 18px; font-weight: 600; }
    .classic-print-title { font-size: 22px; font-weight: 700; margin: 8px 0; }
    .classic-print-meta { font-size: 11px; color: #666; display: flex; gap: 16px; flex-wrap: wrap; }
    .classic-print-table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 16px 0; }
    .classic-print-table th, .classic-print-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    .classic-print-table th { background: #f9fafb; font-weight: 600; }
    .classic-print-table .r { text-align: right; }
    .classic-print-totals { display: flex; justify-content: flex-end; margin-top: 16px; }
    .classic-print-totals-inner { width: 260px; }
    .classic-print-totals-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e5e7eb; }
    .classic-print-totals-row.total { font-weight: 700; border-top: 2px solid #111; margin-top: 4px; }
    .classic-print-footer { margin-top: 24px; text-align: center; font-size: 10px; color: #666; }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-shell" style="min-height: 200vh; padding: 40px;">
      <h1>Hidden ERP shell (simulates settings page behind modal)</h1>
    </div>
    <div class="thermal-print-overlay">
      <div class="no-print" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8);"></div>
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 16px;">
        <div class="pdf-print-root max-w-4xl" style="background: white; padding: 20px; border-radius: 8px;">
          <div class="classic-print-base">
          <div class="classic-print-sheet">
            <header class="classic-print-header">
              <div class="classic-print-company">DIN COUTURE</div>
              <h1 class="classic-print-title">INVOICE</h1>
              <div class="classic-print-meta">
                <span>Invoice No: INV-1042</span>
                <span>Date: 10 Jun 2026</span>
              </div>
            </header>
            <table class="classic-print-table">
              <thead>
                <tr><th>Product</th><th class="r">Qty</th><th class="r">Amount</th></tr>
              </thead>
              <tbody>
                <tr><td>Silk bridal set</td><td class="r">1</td><td class="r">Rs 45,000</td></tr>
                <tr><td>Embroidery add-on</td><td class="r">1</td><td class="r">Rs 8,500</td></tr>
              </tbody>
            </table>
            <div class="classic-print-totals">
              <div class="classic-print-totals-inner">
                <div class="classic-print-totals-row"><span>Subtotal</span><span>Rs 53,500</span></div>
                <div class="classic-print-totals-row total"><span>Total</span><span>Rs 53,500</span></div>
              </div>
            </div>
            <footer class="classic-print-footer"><p>Thank you for your business!</p></footer>
          </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ledger V2 Loading Overlay — Phase 1 Acceptance</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0A0E14; font-family: system-ui, sans-serif; }
    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; }
    .dialog {
      background: #111827; border: 1px solid #374151; border-radius: 12px;
      width: 384px; max-width: 90vw; padding: 32px 24px; text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 16px;
      border: 3px solid #1e3a5f; border-top-color: #60a5fa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; color: #d1d5db; font-size: 14px; line-height: 1.5; }
    .caption { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="backdrop">
    <div class="dialog" role="dialog" aria-label="Loading transaction details">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading transaction details...</p>
    </div>
  </div>
  <div class="caption">Row View / reference click — centered loading overlay (Ledger Center V2)</div>
</body>
</html>
